apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-menu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: restaurant-menu
  template:
    metadata:
      labels:
        app: restaurant-menu
    spec:
      containers:
      - name: restaurant-menu
        image: studydocs/caff-and-co:latest
        ports:
        - containerPort: 80
